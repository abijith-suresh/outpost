name: CI

on:
  pull_request:
  push:
    branches:
      - changeset-release/**
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.job }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        if: matrix.node-version == 22
        run: npm run format:check

      - name: Lint
        if: matrix.node-version == 22
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck --workspace @abijith-suresh/outpost

      - name: Test
        run: npm run test --workspace @abijith-suresh/outpost

      - name: Build
        run: npm run build --workspace @abijith-suresh/outpost

      - name: Installed-package smoke test
        run: npm run test:smoke --workspace @abijith-suresh/outpost

      - name: Verify website
        if: matrix.node-version == 22
        run: npm run verify --workspace outpost-website

      - name: Build website
        if: matrix.node-version == 22
        run: npm run build --workspace outpost-website
